<?php
// 1. AKTIFKAN PELACAK ERROR
error_reporting(E_ALL);
ini_set('display_errors', 1);

$config_file = 'ea_config.json';
$current = array();
$debug_note = "";
$message = null;

// 2. BACA FILE JSON SECARA AMAN (Bersihkan Karakter BOM dari EA)
if (file_exists($config_file)) {
    $file_content = file_get_contents($config_file);
    
    if ($file_content !== false) {
        // Bersihkan biner BOM jika file dibuat oleh MetaTrader/MQL
        if (substr($file_content, 0, 3) === "\xEF\xBB\xBF") {
            $file_content = substr($file_content, 3);
        }
        if (substr($file_content, 0, 2) === "\xFF\xFE" || substr($file_content, 0, 2) === "\xFE\xFF") {
            $file_content = substr($file_content, 2);
        }

        $decoded = json_decode(trim($file_content), true);
        
        if (json_last_error() === JSON_ERROR_NONE && is_array($decoded)) {
            $current = $decoded;
        } else {
            $debug_note = "⚠️ Gagal mengurai data JSON: " . json_last_error_msg();
        }
    } else {
        $debug_note = "⚠️ Sistem tidak memiliki izin untuk membaca berkas ea_config.json.";
    }
} else {
    $debug_note = "⚠️ Berkas ea_config.json tidak ditemukan di direktori ini.";
}

// Mapping variabel utama berdasarkan struktur JSON eksak Anda
$saved_timeout_minutes = isset($current['WebTimeoutMinutes']) ? (int)$current['WebTimeoutMinutes'] : 60;
$mode_control          = isset($current['ModeControl']) ? $current['ModeControl'] : 'LOCAL';
$ext_status            = isset($current['ExtStatusTrading']) ? $current['ExtStatusTrading'] : 'ON';
$current_time          = time();
$time_left             = 0;

// 3. LOGIKA TIMEOUT OTOMATIS (WEB ke LOCAL jika batas waktu habis)
if ($mode_control === 'WEB') {
    if (!isset($current['WebModeStartTime'])) {
        $current['WebModeStartTime'] = $current_time;
        file_put_contents($config_file, json_encode($current, JSON_PRETTY_PRINT), LOCK_EX);
    }
    
    $elapsed_time = $current_time - $current['WebModeStartTime'];
    $allowed_duration = $saved_timeout_minutes * 60;
    $time_left = $allowed_duration - $elapsed_time;
    
    if ($time_left <= 0) {
        $current['ModeControl'] = 'LOCAL';
        unset($current['WebModeStartTime']);
        file_put_contents($config_file, json_encode($current, JSON_PRETTY_PRINT), LOCK_EX);
        $mode_control = 'LOCAL';
        $time_left = 0;
    }
} else {
    if (isset($current['WebModeStartTime'])) {
        unset($current['WebModeStartTime']);
        file_put_contents($config_file, json_encode($current, JSON_PRETTY_PRINT), LOCK_EX);
    }
}

// 4. PROSES DATA SAAT FORM DIKIRIM (POST)
if ($_SERVER['REQUEST_METHOD'] === 'POST') {
    $data = $current;

    $mode = isset($_POST['mode']) ? $_POST['mode'] : $mode_control;
    $status = isset($_POST['status']) ? $_POST['status'] : (isset($_POST['current_status_hidden']) ? $_POST['current_status_hidden'] : $ext_status);
    $new_timeout = isset($_POST['web_timeout_input']) ? (int)$_POST['web_timeout_input'] : $saved_timeout_minutes;

    $data["ModeControl"] = $mode;
    $data["ExtStatusTrading"] = $status;
    $data["WebTimeoutMinutes"] = $new_timeout;

    if (isset($_POST['adx_max'])) $data["ADXMax"] = (int)$_POST['adx_max'];
    if (isset($_POST['ema'])) $data["EMA"] = (int)$_POST['ema'];
    if (isset($_POST['grid_step'])) $data["GridStep"] = (int)$_POST['grid_step'];
    if (isset($_POST['max_layer'])) $data["MaxLayer"] = (int)$_POST['max_layer'];
    
    if (isset($_POST['tp_g1'])) $data["TP_G1"] = (float)$_POST['tp_g1'];
    if (isset($_POST['tp_g2'])) $data["TP_G2"] = (float)$_POST['tp_g2'];
    if (isset($_POST['tp_g3'])) $data["TP_G3"] = (float)$_POST['tp_g3'];
    if (isset($_POST['tp_g4'])) $data["TP_G4"] = (float)$_POST['tp_g4'];
    
    if (isset($_POST['daily_target'])) $data["DailyTarget"] = (float)$_POST['daily_target'];
    if (isset($_POST['max_loss'])) $data["MaxLoss"] = (float)$_POST['max_loss'];

    if (isset($_POST['auto_close_friday'])) {
        $data["AutoCloseFriday"] = ($_POST['auto_close_friday'] === '1');
    }

    if ($mode === 'WEB' && $mode_control !== 'WEB') {
        $data["WebModeStartTime"] = $current_time;
    } elseif ($mode === 'LOCAL') {
        unset($data["WebModeStartTime"]);
    }

    $json_save = json_encode($data, JSON_PRETTY_PRINT);
    if ($json_save !== false) {
        file_put_contents($config_file, $json_save, LOCK_EX);
        $message = "✅ Perubahan berhasil dikirim ke EA";
        
        $current = $data;
        $mode_control = $mode;
        $ext_status = $status;
        $saved_timeout_minutes = $new_timeout;
        $time_left = isset($data["WebModeStartTime"]) ? ($saved_timeout_minutes * 60) - (time() - $data["WebModeStartTime"]) : 0;
    } else {
        $debug_note = "⚠️ Gagal memformat data ke struktur teks JSON.";
    }
}

$is_local = ($mode_control === 'LOCAL');
