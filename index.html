<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganesha Panel - Ultra-Clean Tech</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input-active: #334155;
            --bg-input-locked: #263238;
            --text-active: #ffffff;
            --text-locked: #78909c;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .panel-container {
            background-color: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 550px;
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: #f1f5f9;
            border-bottom: 2px solid #334155;
            padding-bottom: 15px;
        }

        .section-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            margin: 20px 0 10px 0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #475569;
            border-radius: 6px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        /* Mode Selector Custom */
        .mode-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            background-color: #334155;
            color: #94a3b8;
            transition: all 0.2s;
        }

        .mode-btn.active[data-mode="LOCAL"] {
            background-color: var(--warning);
            color: #0f172a;
        }

        .mode-btn.active[data-mode="REMOTE"] {
            background-color: var(--success);
            color: white;
        }

        .timer-banner {
            background-color: rgba(245, 158, 11, 0.1);
            border: 1px solid var(--warning);
            color: var(--warning);
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 15px;
            font-size: 0.9rem;
            display: none;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        .status-box {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

<div class="panel-container">
    <h2>GANESHA PANEL</h2>
    
    <!-- GitHub API Credentials -->
    <div class="section-title">Koneksi GitHub Repository</div>
    <div class="form-group">
        <label for="gh-token">GitHub Personal Access Token</label>
        <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx">
    </div>
    <div class="form-group">
        <label for="gh-repo">Repository (Owner/Nama-Repo)</label>
        <input type="text" id="gh-repo" placeholder="username/nama-repo">
    </div>

    <!-- Mode Control -->
    <div class="section-title">Mode Kontrol EA</div>
    <div class="mode-container">
        <button type="button" class="mode-btn active" data-mode="LOCAL" onclick="setControlMode('LOCAL')">LOCAL</button>
        <button type="button" class="mode-btn" data-mode="REMOTE" onclick="setControlMode('REMOTE')">REMOTE</button>
    </div>

    <!-- UX Fallback Timer Banner -->
    <div id="timer-banner" class="timer-banner">
        Mode REMOTE Aktif. Kembali ke mode LOCAL otomatis dalam: <span id="countdown">300</span> detik.
    </div>

    <!-- EA Trading Parameters -->
    <div class="section-title">Parameter Kontrol (Ultra-Clean Tech)</div>
    
    <div class="form-group">
        <label for="ea-lot">Ukuran Lot (Lot Size)</label>
        <input type="number" id="ea-lot" class="param-input" step="0.01" value="0.01">
    </div>

    <div class="form-group">
        <label for="ea-max-orders">Maksimal Posisi (Max Orders)</label>
        <input type="number" id="ea-max-orders" class="param-input" value="5">
    </div>

    <div class="form-group">
        <label for="ea-autoclose">Auto-Close Friday (23:00)</label>
        <select id="ea-autoclose" class="param-input">
            <option value="true">Aktif (Close Semua Posisi)</option>
            <option value="false">Nonaktif</option>
        </select>
    </div>

    <button type="button" class="btn-submit" onclick="pushConfiguration()">Kirim Konfigurasi ke GitHub</button>
    
    <div id="status-box" class="status-box"></div>
</div>

<script>
    let currentSha = null;
    let currentMode = "LOCAL";
    let fallbackTimer = null;
    let timeLeft = 300; // 5 Menit pengaman fallback

    // Inisialisasi awal saat halaman dimuat
    window.onload = function() {
        toggleInputLock("LOCAL");
    };

    // Fungsi Toggle Kunci Input yang Diperbaiki (.disabled)
    function toggleInputLock(mode) {
        const inputs = document.getElementsByClassName('param-input');
        const isLocal = (mode === 'LOCAL');
        
        for (let i = 0; i < inputs.length; i++) {
            inputs[i].disabled = isLocal; 
            inputs[i].style.background = isLocal ? "var(--bg-input-locked)" : "var(--bg-input-active)";
            inputs[i].style.color = isLocal ? "var(--text-locked)" : "var(--text-active)";
        }
    }

    // Mengubah Mode Kontrol & Mengatur Jalannya Timer Fallback
    function setControlMode(mode) {
        currentMode = mode;
        
        // Update visual tombol aktif
        document.querySelectorAll('.mode-btn').forEach(btn => {
            if(btn.getAttribute('data-mode') === mode) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });

        toggleInputLock(mode);
        clearInterval(fallbackTimer);

        if (mode === "REMOTE") {
            timeLeft = 300; 
            document.getElementById('timer-banner').style.display = 'block';
            document.getElementById('countdown').innerText = timeLeft;
            
            // Jalankan hitung mundur sisi klien
            fallbackTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('countdown').innerText = timeLeft;
                if (timeLeft <= 0) {
                    showStatus("Waktu habis! Sistem otomatis kembali ke mode LOCAL demi keamanan.", "var(--warning)");
                    setControlMode("LOCAL");
                }
            }, 1000);
        } else {
            document.getElementById('timer-banner').style.display = 'none';
        }
    }

    // Fungsi Mengirimkan Payload Data JSON ke GitHub Repository
    async function pushConfiguration() {
        const token = document.getElementById('gh-token').value;
        const repo = document.getElementById('gh-repo').value;
        const path = "ea_config.json"; // Nama file target konfigurasi EA

        if (!token || !repo) {
            showStatus("Mohon lengkapi Token dan Nama Repository GitHub Anda!", "red");
            return;
        }

        showStatus("Menghubungkan ke GitHub...", "var(--primary)");

        const url = `https://api.github.com/repos/${repo}/contents/${path}`;

        try {
            // Langkah 1: Ambil data SHA terbaru dari GitHub untuk mencegah error 409 Conflict
            const getResponse = await fetch(url, {
                method: 'GET',
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });

            if (getResponse.status === 200) {
                const fileData = await getResponse.json();
                currentSha = fileData.sha;
            } else if (getResponse.status !== 404) {
                throw new Error("Gagal melakukan pengecekan data awal di repositori.");
            }

            // Langkah 2: Bangun kerangka struktur objek data payload
            const payload = {
                meta: {
                    updated_at: new Date().toISOString(),
                    client_mode: currentMode
                },
                config: {
                    lot_size: parseFloat(document.getElementById('ea-lot').value),
                    max_orders: parseInt(document.getElementById('ea-max-orders').value),
                    auto_close_friday_2300: document.getElementById('ea-autoclose').value === "true"
                }
            };

            // Enkripsi string data JSON ke bentuk Base64 standard UTF-8 aman
            const jsonString = JSON.stringify(payload, null, 2);
            const base64Content = btoa(unescape(encodeURIComponent(jsonString)));

            const bodyData = {
                message: "Update EA Config via Ganesha Panel",
                content: base64Content
            };

            if (currentSha) {
                bodyData.sha = currentSha;
            }

            // Langkah 3: Eksekusi Update data via HTTP PUT Request
            const putResponse = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json',
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify(bodyData)
            });

            if (putResponse.status === 200 || putResponse.status === 201) {
                const resData = await putResponse.json();
                currentSha = resData.content.sha; // Simpan SHA baru hasil update
                showStatus("Konfigurasi berhasil disimpan dan di-push ke GitHub!", "var(--success)");
            } else {
                const errorData = await putResponse.json();
                throw new Error(errorData.message || "Gagal melakukan pembaruan berkas.");
            }

        } catch (error) {
            showStatus(`Error: ${error.message}`, "red");
        }
    }

    // Helper Utility Komponen Alert Informasi Status Real-Time
    function showStatus(message, color) {
        const box = document.getElementById('status-box');
        box.style.display = 'block';
        box.style.backgroundColor = color === "red" ? "rgba(239, 68, 68, 0.2)" : color.replace(")", ", 0.2)");
        box.style.border = `1px solid ${color}`;
        box.style.color = color === "white" ? "#ffffff" : color;
        box.innerText = message;
    }
</script>

</body>
</html>
