<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UltraClean Tech - EA Control Panel</title>
    <!-- Menggunakan Tailwind CSS untuk tampilan premium dan rapi -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-8 font-sans">

    <div class="max-w-4xl mx-auto bg-slate-900 border border-slate-800 rounded-xl shadow-2xl overflow-hidden">
        <!-- Header Panel -->
        <div class="bg-gradient-to-r from-blue-600 to-cyan-600 p-6">
            <h1 class="text-2xl font-bold tracking-wide">ULTRA-CLEAN TECH</h1>
            <p class="text-blue-100 text-sm mt-1">Web Control Panel Dashboard — EA v2.67 Adaptive</p>
        </div>

        <!-- Form Kontrol -->
        <form id="eaSettingsForm" class="p-6 space-y-6">
            
            <!-- Kategori 1: Status & Mode Utama -->
            <div>
                <h2 class="text-lg font-semibold text-blue-400 border-b border-slate-800 pb-2 mb-4">1. Status & Mode Kendali</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Trading Status (ExtStatusTrading)</label>
                        <select id="ExtStatusTrading" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                            <option value="ON">ON (Aktif)</option>
                            <option value="OFF">OFF (Matikan)</option>
                            <option value="EMERGENCY">EMERGENCY (Close All & Stop)</option>
                            <option value="RESET">RESET (Bersihkan Data)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Control Mode (ModeControl)</label>
                        <input type="text" id="ModeControl" value="WEB" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Web Mode End Time</label>
                        <input type="datetime-local" id="WebModeEndTime" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                </div>
            </div>

            <!-- Kategori 2: Parameter Risiko & Target -->
            <div>
                <h2 class="text-lg font-semibold text-blue-400 border-b border-slate-800 pb-2 mb-4">2. Target Finansial & Batasan Risiko</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Daily Target ($)</label>
                        <input type="number" step="0.01" id="DailyTarget" value="50.00" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Grid Step (Pips)</label>
                        <input type="number" id="GridStep" value="30" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Max Layer</label>
                        <input type="number" id="MaxLayer" value="10" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Max Loss ($)</label>
                        <input type="number" step="0.01" id="MaxLoss" value="500.00" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                </div>
            </div>

            <!-- Kategori 3: Target Profit Kelompok (Take Profit Groups) -->
            <div>
                <h2 class="text-lg font-semibold text-blue-400 border-b border-slate-800 pb-2 mb-4">3. Pengaturan Take Profit Kelompok</h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">TP Group 1</label>
                        <input type="number" id="TP_G1" value="20" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">TP Group 2</label>
                        <input type="number" id="TP_G2" value="25" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">TP Group 3</label>
                        <input type="number" id="TP_G3" value="30" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">TP Group 4</label>
                        <input type="number" id="TP_G4" value="35" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                </div>
            </div>

            <!-- Kategori 4: Filter Indikator -->
            <div>
                <h2 class="text-lg font-semibold text-blue-400 border-b border-slate-800 pb-2 mb-4">4. Filter Indikator Pasar</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">ADX Max Filter</label>
                        <input type="number" id="ADXMax" value="35" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">EMA Period</label>
                        <input type="number" id="EMA" value="50" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                </div>
            </div>

            <!-- Tombol Aksi -->
            <div class="pt-4 flex flex-col sm:flex-row gap-3">
                <button type="button" onclick="saveSettings()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 cursor-pointer shadow-lg shadow-blue-900/40 text-center">
                    Simpan Perubahan
                </button>
                <button type="button" onclick="downloadJSON()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 font-medium py-3 px-6 rounded-lg transition duration-200 cursor-pointer text-center">
                    Unduh File JSON
                </button>
            </div>
        </form>

        <!-- Preview Output Data (Untuk mempermudah monitoring) -->
        <div class="bg-slate-950 p-6 border-t border-slate-800">
            <h3 class="text-sm font-semibold text-slate-400 mb-2 tracking-wide uppercase">Live JSON String Preview (Apa yang dibaca EA):</h3>
            <pre id="jsonPreview" class="text-xs text-emerald-400 bg-slate-900/50 p-3 rounded-lg border border-slate-800 overflow-x-auto">{}</pre>
        </div>
    </div>

    <!-- Sistem Logika Sinkronisasi -->
    <script>
        // Fungsi untuk mengambil data dari Form ke Object JavaScript
        function getSettingsObject() {
            return {
                ExtStatusTrading: document.getElementById('ExtStatusTrading').value,
                ModeControl: document.getElementById('ModeControl').value,
                WebModeEndTime: document.getElementById('WebModeEndTime').value ? new Date(document.getElementById('WebModeEndTime').value).toISOString() : "",
                DailyTarget: parseFloat(document.getElementById('DailyTarget').value) || 0,
                GridStep: parseInt(document.getElementById('GridStep').value) || 0,
                MaxLayer: parseInt(document.getElementById('MaxLayer').value) || 0,
                MaxLoss: parseFloat(document.getElementById('MaxLoss').value) || 0,
                TP_G1: parseInt(document.getElementById('TP_G1').value) || 0,
                TP_G2: parseInt(document.getElementById('TP_G2').value) || 0,
                TP_G3: parseInt(document.getElementById('TP_G3').value) || 0,
                TP_G4: parseInt(document.getElementById('TP_G4').value) || 0,
                ADXMax: parseInt(document.getElementById('ADXMax').value) || 0,
                EMA: parseInt(document.getElementById('EMA').value) || 0
            };
        }

        // Fungsi memperbarui Preview Real-time saat ada perubahan input
        function updatePreview() {
            const data = getSettingsObject();
            document.getElementById('jsonPreview').textContent = JSON.stringify(data, null, 4);
        }

        // Daftarkan event listener ke semua field form untuk update preview otomatis
        document.getElementById('eaSettingsForm').addEventListener('input', updatePreview);
        document.getElementById('ExtStatusTrading').addEventListener('change', updatePreview);

        // Fungsi utama saat tombol "Simpan" ditekan
        function saveSettings() {
            const finalData = getSettingsObject();
            
            // CATATAN UNTUK BACKEND: 
            // Bagian ini mengirimkan data JSON ke server host Anda.
            // Silakan sesuaikan endpoint URL '/update-settings' dengan skrip server Anda (misal: save.php).
            fetch('/update-settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(finalData)
            })
            .then(response => {
                if(response.ok) {
                    alert('Pengaturan berhasil dikirim ke server VPS/Hosting!');
                } else {
                    alert('Gagal mengirim ke server backend. Periksa setup file backend Anda.');
                }
            })
            .catch(err => {
                console.error(err);
                alert('Berhasil membuat perubahan lokal! Pastikan backend penampung file JSON Anda sudah aktif.');
            });
        }

        // Fungsi cadangan jika user ingin mengunduh konfigurasinya langsung sebagai file .json
        function downloadJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(getSettingsObject(), null, 4));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "settings.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        // Jalankan preview awal saat halaman pertama kali dimuat
        updatePreview();
    </script>
</body>
</html>
