<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganesha Panel - Ultra Clean Tech</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; padding: 20px; }
        .card { max-width: 500px; margin: auto; background: #1e293b; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.5); }
        .header-container { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        .header-title { font-size: 1.6rem; font-weight: bold; color: #38bdf8; display: flex; align-items: center; justify-content: center; gap: 8px; margin: 0; }
        .header-subtitle { font-size: 0.85rem; color: #94a3b8; margin-top: 4px; font-weight: normal; letter-spacing: 0.5px; }
        .msg { background: #065f46; color: #34d399; padding: 12px; border-radius: 6px; text-align: center; margin-bottom: 15px; font-weight: bold; display: none; }
        .err-msg { background: #7f1d1d; color: #fca5a5; padding: 12px; border-radius: 6px; text-align: left; margin-bottom: 15px; font-size: 0.85rem; line-height: 1.4; border: 1px solid #f87171; display: none; white-space: pre-wrap; word-break: break-all; }
        label { display: block; font-size: 0.75rem; font-weight: bold; color: #94a3b8; margin-top: 10px; text-transform: uppercase; }
        select, input { width: 100%; padding: 10px; background: #334155; border: 1px solid #475569; color: white; border-radius: 6px; margin-top: 4px; box-sizing: border-box; transition: 0.2s; font-size: 1.1rem; }
        .btn-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 10px; }
        .btn-status { padding: 12px 5px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: bold; color: white; opacity: 0.4; transition: 0.2s; }
        .active-btn { opacity: 1 !important; outline: 2px solid #fff; transform: scale(1.05); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button.update-btn { width: 100%; padding: 14px; background: #0284c7; color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .setting-box-top { font-size: 0.75rem; color: #f43f5e; font-weight: bold; margin-top: 4px; text-align: right; display: flex; align-items: center; gap: 4px; }
        .input-menit { width: 50px; padding: 2px 4px; background: #475569; border: none; color: white; border-radius: 4px; font-size: 0.75rem; text-align: center; margin-top: 0; margin-left: 2px; }
        .token-box { background: #111827; border: 1px dashed #4b5563; padding: 10px; border-radius: 6px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header-container">
            <h2 class="header-title"><span>🧪</span> Ultra-Clean Tech.</h2>
            <div class="header-subtitle">  Panel Web V2.51</div>
        </div>

        <!-- Otorisasi Kredensial Akses GitHub -->
        <div class="token-box">
            <label style="margin-top:0; color:#38bdf8;">POWER: Token_EA-</label>
            <input type="password" id="gh_token" placeholder="Paste Personal Access Token Disini" style="font-size:0.9rem; padding:6px; background:#1f2937;">
        </div>

        <div id="err_display" class="err-msg"></div>
        <div id="msg_display" class="msg"></div>
        
        <form id="panel_form">
            <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                <label style="margin-top:0;">Mode Kontrol</label>
                <div class="setting-box-top">
                    <span>Maks Web:</span>
                    <input type="number" id="web_timeout_input" class="input-menit" value="60">
                    <span>Mnt</span>
                    <span id="timer_wrapper" style="display:none;">
                        <span style="color:#94a3b8; margin-left: 5px;">|</span>
                        <span id="timer_display" style="margin-left: 5px; color: #34d399;">--:--</span>
                    </span>
                </div>
            </div>
            
            <select id="mode_select">
                <option value="WEB">WEB CONTROL</option>
                <option value="LOCAL" selected>LOCAL (Manual)</option>
            </select>
            
            <label>Status Trading</label>
            <div class="btn-group">
                <button type="button" onclick="setStatus('ON')" id="btn_on" class="btn-status" style="background:#16a34a;">✅<br>ON</button>
                <button type="button" onclick="setStatus('OFF')" id="btn_off" class="btn-status" style="background:#ca8a04;">⏸️<br>OFF</button>
                <button type="button" onclick="setStatus('EMERGENCY')" id="btn_emer" class="btn-status" style="background:#dc2626;">🚨<br>EMER</button>
            </div>

            <div class="grid-2">
                <div><label>ADX Max</label><input type="number" id="adx_max" class="param-input" value="50"></div>
                <div><label>EMA</label><input type="number" id="ema" class="param-input" value="50"></div>
            </div>
            <div class="grid-2">
                <div><label>Grid Step</label><input type="number" id="grid_step" class="param-input" value="50"></div>
                <div><label>Max Layer</label><input type="number" id="max_layer" class="param-input" value="15"></div>
            </div>

            <!-- ========================================================================= -->
            <!-- KRUSIAL: DATA TP_G1, TP_G2, & TP_G3 TETAP ADA DI DOM TETAPI TERSEMBUNYI  -->
            <!-- ========================================================================= -->
            <div style="display: none;">
                <input type="number" step="0.01" id="tp_g1" class="param-input" value="2">
                <input type="number" step="0.01" id="tp_g2" class="param-input" value="8">
                <input type="number" step="0.01" id="tp_g3" class="param-input" value="20">
            </div>

            <!-- SISA HAMPARAN PARAMETER DIATUR SEJAJAR DUA-DUA BIAR RAPI -->
            <div class="grid-2">
                <div><label>TP G4</label><input type="number" step="0.01" id="tp_g4" class="param-input" value="55"></div>
                <div><label>TP G5</label><input type="number" step="0.01" id="tp_g5" class="param-input" value="150"></div>
            </div>
            <div class="grid-2">
                <div><label>TP G6</label><input type="number" step="0.01" id="tp_g6" class="param-input" value="450"></div>
                <div><label>TP G7</label><input type="number" step="0.01" id="tp_g7" class="param-input" value="1400"></div>
            </div>
            <div class="grid-2">
                <div><label>Daily Target</label><input type="number" step="0.01" id="daily_target" class="param-input" value="2000"></div>
                <div><label>Max Loss</label><input type="number" step="0.01" id="max_loss" class="param-input" value="1000"></div>
            </div>

            <button type="submit" class="update-btn">SIMPAN PERUBAHAN PARAMETER</button>
        </form>
    </div>

    <script>
        // =========================================================================
        // PENTING: UBAH TIGA VARIABEL DI BAWAH INI SESUAI DENGAN AKUN GITHUB ANDA!
        // =========================================================================
        const GH_USER = "Poer411";        // Username GitHub Anda
        const GH_REPO = "ganesha-panel";  // Nama Repositori Anda
        const GH_FILE = "ea_config.json"; // Nama file JSON target konfigurasi

        let currentData = {};
        let currentSha = "";
        let currentStatus = "ON";
        let countdownInterval;

        // Load Token dan Data JSON Saat Halaman Pertama Kali Dibuka
        document.addEventListener("DOMContentLoaded", () => {
            const savedToken = localStorage.getItem("gh_pat");
            if(savedToken) document.getElementById("gh_token").value = savedToken;
            
            document.getElementById("mode_select").addEventListener("change", (e) => toggleInputLock(e.target.value));
            document.getElementById("panel_form").addEventListener("submit", handleFormSubmit);
            
            loadConfigFromGitHub();
        });

        // Ambil data fresh langsung dari GitHub API (Mendukung Repo Publik & Private)
        async function loadConfigFromGitHub() {
            try {
                const token = localStorage.getItem("gh_pat") || "";
                const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}?t=${Date.now()}`;
                
                const headers = {};
                if (token) {
                    headers["Authorization"] = `token ${token}`;
                }

                const res = await fetch(url, { headers });
                
                if (res.status === 404 && !token) {
                    throw new Error("File tidak ditemukan. Jika repositori Anda PRIVATE, masukkan Token di atas terlebih dahulu lalu refresh halaman.");
                }
                
                if (!res.ok) throw new Error(`Server merespon dengan status ${res.status}`);
                
                const json = await res.json();
                currentSha = json.sha; // Simpan hash penanda versi file dari GitHub
                
                // Decode teks base64 dari GitHub ke JSON
                const contentText = decodeURIComponent(escape(atob(json.content)));
                currentData = JSON.parse(contentText);
                
                populateForm(currentData);
                hideAlerts();
            } catch (err) {
                showError("Gagal memuat konfigurasi: " + err.message);
            }
        }

        // Distribusikan data dari JSON ke kolom input form HTML
        function populateForm(data) {
            document.getElementById("web_timeout_input").value = data.WebTimeoutMinutes || 60;
            document.getElementById("mode_select").value = data.ModeControl || "LOCAL";
            
            setStatus(data.ExtStatusTrading || "ON");
            
            document.getElementById("adx_max").value = data.ADXMax ?? 50;
            document.getElementById("ema").value = data.EMA ?? 50;
            document.getElementById("grid_step").value = data.GridStep ?? 50;
            document.getElementById("max_layer").value = data.MaxLayer ?? 15;
            
            document.getElementById("tp_g1").value = data.TP_G1 ?? 2;
            document.getElementById("tp_g2").value = data.TP_G2 ?? 8;
            document.getElementById("tp_g3").value = data.TP_G3 ?? 20;
            document.getElementById("tp_g4").value = data.TP_G4 ?? 55;
            // POPULATE DATA BARU GROUP 5 - 7
            document.getElementById("tp_g5").value = data.TP_G5 ?? 150;
            document.getElementById("tp_g6").value = data.TP_G6 ?? 450;
            document.getElementById("tp_g7").value = data.TP_G7 ?? 1400;
            
            document.getElementById("daily_target").value = data.DailyTarget ?? 2000;
            document.getElementById("max_loss").value = data.MaxLoss ?? 1000;
            
            toggleInputLock(data.ModeControl || "LOCAL");
            initTimer(data);
        }

        function setStatus(status) {
            currentStatus = status;
            document.getElementById("btn_on").classList.remove("active-btn");
            document.getElementById("btn_off").classList.remove("active-btn");
            document.getElementById("btn_emer").classList.remove("active-btn");
            
            if(status === "ON") document.getElementById("btn_on").classList.add("active-btn");
            if(status === "OFF") document.getElementById("btn_off").classList.add("active-btn");
            if(status === "EMERGENCY") document.getElementById("btn_emer").classList.add("active-btn");
        }

        function toggleInputLock(mode) {
            const inputs = document.getElementsByClassName('param-input');
            const isLocal = (mode === 'LOCAL');
            for (let i = 0; i < inputs.length; i++) {
                inputs[i].readOnly = isLocal;
                inputs[i].style.background = isLocal ? "#263238" : "#334155";
                inputs[i].style.color = isLocal ? "#78909c" : "white";
            }
        }

        // Jalankan Fitur Timer Hitung Mundur Berbasis Sisi Klien
        function initTimer(data) {
            clearInterval(countdownInterval);
            document.getElementById("timer_wrapper").style.display = "none";
            
            if (data.ModeControl === "WEB" && data.WebModeStartTime) {
                document.getElementById("timer_wrapper").style.display = "inline";
                const start = parseInt(data.WebModeStartTime);
                const limit = parseInt(data.WebTimeoutMinutes || 60) * 60;
                
                countdownInterval = setInterval(() => {
                    const now = Math.floor(Date.now() / 1000);
                    const elapsed = now - start;
                    const timeLeft = limit - elapsed;
                    
                    if (timeLeft <= 0) {
                        clearInterval(countdownInterval);
                        autoFallbackToLocal();
                    } else {
                        let mins = Math.floor(timeLeft / 60);
                        let secs = timeLeft % 60;
                        document.getElementById("timer_display").innerText = 
                            `${mins < 10 ? '0'+mins : mins}:${secs < 10 ? '0'+secs : secs}`;
                    }
                }, 1000);
            }
        }

        // Eksekusi otomatis jika batas waktu Web Control habis
        function autoFallbackToLocal() {
            document.getElementById("mode_select").value = "LOCAL";
            showError("Waktu batas Web Control habis! Mengembalikan kontrol ke LOCAL...");
            document.getElementById("panel_form").requestSubmit();
        }

        // Proses Penyimpanan Data ke File GitHub Menggunakan API
        async function handleFormSubmit(e) {
            e.preventDefault();
            hideAlerts();
            
            const token = document.getElementById("gh_token").value.trim();
            if(!token) {
                showError("⚠️ Token masih kosong! Masukkan GitHub Token Anda di kolom paling atas.");
                return;
            }
            localStorage.setItem("gh_pat", token); // Simpan token secara aman di memori lokal browser

            const selectedMode = document.getElementById("mode_select").value;
            
            // Siapkan susunan data JSON baru (Safe-Merge)
            let updatedData = { ...currentData };
            
            updatedData.ModeControl = selectedMode;
            updatedData.ExtStatusTrading = currentStatus;
            updatedData.WebTimeoutMinutes = parseInt(document.getElementById("web_timeout_input").value);
            
            updatedData.ADXMax = parseInt(document.getElementById("adx_max").value);
            updatedData.EMA = parseInt(document.getElementById("ema").value);
            updatedData.GridStep = parseInt(document.getElementById("grid_step").value);
            updatedData.MaxLayer = parseInt(document.getElementById("max_layer").value);
            
            updatedData.TP_G1 = parseFloat(document.getElementById("tp_g1").value);
            updatedData.TP_G2 = parseFloat(document.getElementById("tp_g2").value);
            updatedData.TP_G3 = parseFloat(document.getElementById("tp_g3").value);
            updatedData.TP_G4 = parseFloat(document.getElementById("tp_g4").value);
            // PARSING DATA BARU GROUP 5 - 7 KE OBJEK JSON
            updatedData.TP_G5 = parseFloat(document.getElementById("tp_g5").value);
            updatedData.TP_G6 = parseFloat(document.getElementById("tp_g6").value);
            updatedData.TP_G7 = parseFloat(document.getElementById("tp_g7").value);
            
            updatedData.DailyTarget = parseFloat(document.getElementById("daily_target").value);
            updatedData.MaxLoss = parseFloat(document.getElementById("max_loss").value);

            // Kelola penanda waktu mulai web
            if (selectedMode === "WEB" && currentData.ModeControl !== "WEB") {
                updatedData.WebModeStartTime = Math.floor(Date.now() / 1000);
            } else if (selectedMode === "LOCAL") {
                delete updatedData.WebModeStartTime;
            }

            const targetUrl = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;

            try {
                // 1. Cek versi SHA terbaru sebelum menimpa file untuk menghindari konflik data (Status 409)
                const checkRes = await fetch(targetUrl, { 
                    headers: { 'Authorization': `token ${token}` } 
                });
                
                if (!checkRes.ok) {
                    throw new Error(`[Tahap Cek SHA Gagal] Server merespon dengan kode ${checkRes.status}.\nAlamat API yang diakses: ${targetUrl}`);
                }
                
                const checkJson = await checkRes.json();
                currentSha = checkJson.sha;

                // 2. Encode content data baru ke format Base64 untuk dikirim ke API GitHub
                const utf8Bytes = new TextEncoder().encode(JSON.stringify(updatedData, null, 4));
                const base64Content = btoa(String.fromCharCode(...utf8Bytes));

                const bodyPayload = {
                    message: "Pembaruan parameter via Ganesha Panel Web",
                    content: base64Content,
                    sha: currentSha
                };

                // 3. Kirim data pembaruan menggunakan metode PUT
                const saveRes = await fetch(targetUrl, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(bodyPayload)
                });

                if(!saveRes.ok) {
                    const errData = await saveRes.json();
                    throw new Error(`[Tahap Simpan Gagal] ${errData.message || 'Error tidak diketahui'}`);
                }

                showSuccess("✅ Perubahan berhasil dikomit langsung ke GitHub Repository!");
                currentData = updatedData;
                initTimer(currentData);
            } catch (err) {
                showError(`🚨 DIAGNOSIS ERROR:\n${err.message}\n\n👉 TIPS: Pastikan variabel USERNAME "${GH_USER}" dan REPO "${GH_REPO}" di bagian bawah script HTML Anda sudah diubah dan ditulis sama persis (huruf besar/kecil) dengan akun GitHub Anda.`);
            }
        }

        function showError(msg) {
            const errDiv = document.getElementById("err_display");
            errDiv.innerText = msg;
            errDiv.style.display = "block";
        }

        function showSuccess(msg) {
            const msgDiv = document.getElementById("msg_display");
            msgDiv.innerText = msg;
            msgDiv.style.display = "block";
            setTimeout(() => msgDiv.style.display = "none", 4000);
        }

        function hideAlerts() {
            document.getElementById("err_display").style.display = "none";
            document.getElementById("msg_display").style.display = "none";
        }
    </script>
</body>
</html>
